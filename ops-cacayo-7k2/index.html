<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#111827" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>CACAYO CTD — Secure Staff Operations</title>
  <meta name="description" content="Secure internal operations portal for authorized CACAYO staff." />
  <link rel="stylesheet" href="./styles.css?v=3.2.4" />
</head>
<body>
  <div id="app">
    <div class="login-wrap">
      <section class="login-card">
        <div class="mini-brand">
          <img src="./cacayo-logo.jpg" alt="CACAYO logo"/>
          <div>
            <b>CACAYO</b>
            <span>CHINESE CALIFORNIAN FUSION FOOD</span>
          </div>
        </div>
        <h1>Secure Staff Operations</h1>
        <div class="notice">Loading staff portal v3.2.4...</div>
      </section>
    </div>
  </div>

  <template id="layout-template">
    <header class="topbar">
      <div class="topbar-brand-wrap brand-home-link" id="brand-home-link" role="button" tabindex="0" aria-label="Kembali ke halaman login">
        <img src="./cacayo-logo.jpg" alt="CACAYO logo" class="brand-logo"/>
        <div>
          <div class="brand">Cash to Dine</div>
          <div class="subbrand" id="outlet-name">Dining Credit System</div>
        </div>
      </div>
      <button class="ghost small" id="logout-btn">Logout</button>
    </header>
    <main id="screen"></main>
    <nav class="bottom-nav" id="bottom-nav"></nav>
  </template>

  <script src="./staff-bootstrap.js?v=3.2.4"></script>
  <script src="./qr-local.js?v=3.2.4"></script>
  <script src="./app.js?v=3.2.4"></script>
</body>
</html>
